<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Hindi Typography Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap" rel="stylesheet">
    
    <!-- Primary Meta Tags -->
    <title>SliceURL</title>
    <meta name="title" content="SliceURL" />
    <meta name="description" content="Shorten URLs, track clicks, secure links – all powered by SliceURL. The smart, fast &amp; professional link shortener.">
    <meta name="author" content="SliceURL" />
    <meta name="keywords" content="url shortener, link shortener, short links, track clicks, link analytics, secure links, SliceURL">
    <meta name="application-name" content="SliceURL" />
    <meta name="apple-mobile-web-app-title" content="SliceURL" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://sliceurl.app" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sliceurl.app" />
    <meta property="og:title" content="SliceURL">
    <meta property="og:description" content="Shorten URLs, track clicks, secure links – all powered by SliceURL. The smart, fast &amp; professional link shortener.">
    <meta property="og:site_name" content="SliceURL" />
    <meta property="og:image" content="https://sliceurl.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://sliceurl.app" />
    <meta name="twitter:title" content="SliceURL">
    <meta name="twitter:description" content="Shorten URLs, track clicks, secure links – all powered by SliceURL. The smart, fast &amp; professional link shortener.">
    <meta name="twitter:site" content="@SliceURL" />
    <meta name="twitter:image" content="https://sliceurl.app/og-image.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#000000" />
    <meta name="msapplication-TileColor" content="#000000" />
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
